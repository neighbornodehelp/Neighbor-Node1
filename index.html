<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeighborNode | Smart Neighborhood Network</title>
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
            --text-gray: #8b949e;
            --success-green: #2ea043;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cta-button, .submit-btn {
            background: var(--primary-cyan);
            color: black;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .cta-button:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            transform: scale(1.02);
        }

        /* AUTH TABS */
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: none; border: 1px solid #30363d; color: var(--text-gray); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(0, 242, 255, 0.05); }

        .item-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            transition: 0.3s;
        }

        .item-card:hover {
            border-color: var(--primary-cyan) !important;
            background: rgba(0, 242, 255, 0.05) !important;
            transform: translateY(-5px);
        }

        .item-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #000;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        #main-app { display: none; width: 100%; flex-direction: column; align-items: center; }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        select:disabled { opacity: 0.5; cursor: not-allowed; }
        label { color: var(--primary-cyan); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; text-align: left; }

        header { padding: 40px 20px; text-align: center; max-width: 800px; }
        h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(90deg, #fff, var(--primary-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div id="nodeStatus" style="color: var(--primary-cyan); font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 2px;">
            📡 NODE STATUS: LOCKED
        </div>
        <h1>NeighborNode</h1>
        <p style="color: var(--text-gray);">Community-led rentals. Trust the node.</p>

        <div id="auth-box" class="form-container">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="toggleAuth('login')">LOGIN</button>
                <button id="tab-signup" class="tab-btn" onclick="toggleAuth('signup')">ACTIVATE NODE</button>
            </div>

            <form id="loginForm">
                <label>Registered Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
                <button type="submit" class="submit-btn">ACCESS NETWORK</button>
            </form>

            <form id="neighborForm" style="display: none;">
                <label>Full Name</label>
                <input type="text" name="Full Name" placeholder="Ex: Rahul Sharma" pattern="[A-Za-z\s]+" title="Letters only" required>
                
                <label>Country</label>
                <select id="country" name="Country" required>
                    <option value="India">India</option>
                </select>

                <label>State</label>
                <select id="state" name="State" required>
                    <option value="">Select State</option>
                </select>

                <label>District/City (Capital)</label>
                <select id="city" name="City" required>
                    <option value="">Select Capital</option>
                </select>
                
                <label>Email Address</label>
                <input type="email" name="Email" placeholder="rahul@example.com" required>

                <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; text-align: left;">
                    <input type="checkbox" id="terms" required style="width: 18px; height: 18px; margin-top: 2px;">
                    <label for="terms" style="color: var(--text-gray); font-size: 0.75rem; text-transform: none; font-weight: normal; line-height: 1.2;">
                        I agree to the <a href="#" onclick="showTerms()" style="color: var(--primary-cyan); text-decoration: underline;">Guidelines</a>.
                    </label>
                </div>

                <button type="submit" class="submit-btn">ACTIVATE NODE</button>
            </form>
        </div>
    </header>

    <div id="main-app">
        <div class="form-container" style="border-color: var(--success-green);">
            <form id="itemForm">
                <h2 style="color: var(--success-green); margin-top: 0;">2. List Your Item</h2>
                <input type="hidden" id="hiddenEmail" name="UserEmail">
                
                <label>Item Name</label>
                <input type="text" name="ItemName" placeholder="Ex: Camping Tent" required>
                
                <label>Price per Day (₹)</label>
                <input type="number" name="Price" placeholder="Ex: 200" required>
                
                <label>WhatsApp Number</label>
                <input type="tel" name="Contact" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                
                <label>Item Photo (Optional)</label>
                <input type="file" id="itemPhoto" accept="image/*" style="padding: 5px;">
                
                <button type="submit" class="submit-btn" style="background: var(--success-green);">SUBMIT ITEM</button>
            </form>
        </div>

        <div class="search-container">
            <label>Search Community Gear</label>
            <input type="text" id="searchInput" placeholder="Search Trimmer, Drill, Bag..." onkeyup="filterItems()">
        </div>

        <section id="inventory" style="padding: 0 20px 40px 20px; width: 100%; max-width: 1100px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 style="color: var(--primary-cyan); letter-spacing: 2px;">COMMUNITY LISTINGS</h2>
            </div>
            <div id="dynamic-inventory" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;">
                <div class="loader"></div>
            </div>
        </section>

        <div style="margin: 20px auto 60px auto; text-align: center;">
            <button onclick="shareNode()" class="cta-button" style="background: transparent; border: 2px solid var(--primary-cyan); color: var(--primary-cyan); width: 250px;">
                📢 INVITE NEIGHBORS
            </button>
            <br><br>
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; text-decoration:underline;">Logout Account</button>
        </div>
    </div>

    <footer style="background: #0d1117; padding: 50px 20px; border-top: 1px solid #30363d; width: 100%; text-align: center;">
        <h2 style="color: var(--primary-cyan);">NeighborNode</h2>
        <p style="color: #484f58; font-size: 0.8rem;">&copy; 2026 NeighborNode. Support: neighbornode.help@gmail.com</p>
    </footer>

    <script>
        // Replace with your Apps Script Web App URL
        const scriptURL ='https://script.google.com/macros/s/AKfycbz1VucuBInbgFSSoqgADWG3iNorv7t55-uwUqlWADfBVS7ezsLV0PKi__niiIQwyqD1/exec';
        
        let allItems = [];
        let globalUserName = "";

        // ON LOAD: Check Session and Setup States
        window.onload = () => {
            const savedEmail = localStorage.getItem('neighborEmail');
            const savedName = localStorage.getItem('neighborName');
            if (savedEmail && savedName) {
                globalUserName = savedName;
                unlockApp(savedEmail);
            }
            setupStateDropdown();
        };

        function toggleAuth(type) {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('neighborForm').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-signup').classList.toggle('active', type === 'signup');
        }

        // LOGIN LOGIC
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.toLowerCase();
            const btn = e.target.querySelector('button');
            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                const resp = await fetch(`${scriptURL}?checkEmail=${encodeURIComponent(email)}`);
                const result = await resp.json();
                if (result.exists) {
                    localStorage.setItem('neighborEmail', email);
                    localStorage.setItem('neighborName', result.name);
                    globalUserName = result.name;
                    unlockApp(email);
                } else {
                    alert("Email not found. Please activate your node first!");
                    btn.innerText = "ACCESS NETWORK";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server error. Try again.");
                btn.disabled = false;
            }
        });

        function unlockApp(email) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('hiddenEmail').value = email;
            document.getElementById('nodeStatus').innerText = `📡 NODE ONLINE: ${globalUserName.toUpperCase()}`;
            loadLiveInventory();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // INVENTORY LOGIC
        async function loadLiveInventory() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                allItems = data.items.slice(1); 
                renderItems(allItems);
            } catch (err) { console.error(err); }
        }

        function renderItems(items) {
            const div = document.getElementById('dynamic-inventory');
            div.innerHTML = items.length ? "" : "<p style='grid-column: 1/-1;'>No gear listed in this node yet.</p>";
            items.forEach(row => {
                const img = row[5] || "https://via.placeholder.com/300x200?text=No+Photo";
                div.innerHTML += `
                    <div class="item-card">
                        <div style="position: absolute; top: 10px; right: 10px; background: var(--primary-cyan); color: black; padding: 4px 10px; border-radius: 10px; font-weight: 900; font-size: 0.8rem;">₹${row[2]}/DAY</div>
                        <img src="${img}" class="item-img" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Loading...'">
                        <h3>${row[1]}</h3>
                        <p style="color: var(--text-gray); font-size: 0.85rem; margin-bottom: 15px;">Verified Kukatpally Neighbor</p>
                        <button onclick="window.open('https://wa.me/91${row[3]}?text=Hi, I want to rent your ${row[1]}')" class="cta-button">REQUEST RENTAL</button>
                    </div>`;
            });
        }

        function filterItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderItems(allItems.filter(i => i[1].toString().toLowerCase().includes(term)));
        }

        // SIGNUP LOGIC
        document.getElementById('neighborForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "ACTIVATING...";
            btn.disabled = true;

            const formData = new FormData(this);
            const payload = {};
            formData.forEach((value, key) => payload[key] = value);

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => {
                alert("Node Activated! Please Login to access the network.");
                location.reload();
            });
        });

        // ITEM LISTING LOGIC (WITH IMAGE)
        document.getElementById('itemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const file = document.getElementById('itemPhoto').files[0];
            const reader = new FileReader();
            
            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            const submitData = (base64) => {
                const payload = {
                    ItemName: e.target.ItemName.value,
                    Price: e.target.Price.value,
                    Contact: e.target.Contact.value,
                    UserEmail: document.getElementById('hiddenEmail').value,
                    imageFile: base64
                };
                fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => {
                    alert("Success! Your item is now live.");
                    location.reload();
                });
            };

            if (file) {
                reader.onload = () => submitData(reader.result);
                reader.readAsDataURL(file);
            } else {
                submitData(null);
            }
        });

        // FULL STATE DATA (ALL 28 STATES)
        function setupStateDropdown() {
            const stateData = {
                "Andhra Pradesh": "Amaravati", "Arunachal Pradesh": "Itanagar", "Assam": "Dispur", "Bihar": "Patna", "Chhattisgarh": "Raipur", "Goa": "Panaji", "Gujarat": "Gandhinagar", "Haryana": "Chandigarh", "Himachal Pradesh": "Shimla", "Jharkhand": "Ranchi", "Karnataka": "Bengaluru", "Kerala": "Thiruvananthapuram", "Madhya Pradesh": "Bhopal", "Maharashtra": "Mumbai", "Manipur": "Imphal", "Meghalaya": "Shillong", "Mizoram": "Aizawl", "Nagaland": "Kohima", "Odisha": "Bhubaneswar", "Punjab": "Chandigarh", "Rajasthan": "Jaipur", "Sikkim": "Gangtok", "Tamil Nadu": "Chennai", "Telangana": "Hyderabad", "Tripura": "Agartala", "Uttar Pradesh": "Lucknow", "Uttarakhand": "Dehradun", "West Bengal": "Kolkata", "Delhi": "New Delhi"
            };
            const sSelect = document.getElementById('state');
            const cSelect = document.getElementById('city');
            
            const sortedStates = Object.keys(stateData).sort();
            sSelect.innerHTML = '<option value="">Select State</option>' + sortedStates.map(s => `<option value="${s}">${s}</option>`).join('');
            
            sSelect.onchange = () => {
                cSelect.innerHTML = `<option value="${stateData[sSelect.value]}">${stateData[sSelect.value]}</option>`;
            };
        }

        function showTerms() { alert("Respect assets, pay for damage, and meet in public."); }
        function shareNode() { window.open(`https://wa.me/?text=${encodeURIComponent("Join NeighborNode: " + window.location.href)}`, '_blank'); }
    </script>
</body>
</html>
