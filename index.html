<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeighborNode | Smart Neighborhood Network</title>
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
            --text-gray: #8b949e;
            --success-green: #2ea043;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cta-button, .submit-btn {
            background: var(--primary-cyan);
            color: black;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .cta-button:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            transform: scale(1.02);
        }

        .item-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            transition: 0.3s;
        }

        .item-card:hover {
            border-color: var(--primary-cyan) !important;
            background: rgba(0, 242, 255, 0.05) !important;
            transform: translateY(-5px);
        }

        .item-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #000;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        select:disabled { opacity: 0.5; cursor: not-allowed; }
        label { color: var(--primary-cyan); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; text-align: left; }

        header { padding: 40px 20px; text-align: center; max-width: 800px; }
        h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(90deg, #fff, var(--primary-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div id="nodeCounter" style="color: var(--primary-cyan); font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 2px;">
            📡 INITIALIZING LOCAL NODE...
        </div>
        <h1>NeighborNode</h1>
        <p style="color: var(--text-gray);">Community-led rentals. Trust the node.</p>

        <div id="activation-container" class="form-container">
            <form id="neighborForm">
                <h2 style="margin-top: 0;">1. Activate Your Node</h2>
                <label>Full Name</label>
                <input type="text" name="Full Name" placeholder="Ex: Rahul Sharma" pattern="[A-Za-z\s]+" title="Letters only" required>
                
                <label>Country</label>
                <select id="country" name="Country" required>
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                </select>

                <label>State</label>
                <select id="state" name="State" disabled required><option value="">Select State</option></select>

                <label>District/City (Capital)</label>
                <select id="city" name="City" disabled required><option value="">Select Capital</option></select>
                
                <label>Email Address</label>
                <input type="email" name="Email" placeholder="rahul@example.com" required>

                <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; text-align: left;">
                    <input type="checkbox" id="terms" name="Terms" required style="width: 18px; height: 18px; margin-top: 2px; cursor: pointer;">
                    <label for="terms" style="color: var(--text-gray); font-size: 0.75rem; text-transform: none; font-weight: normal; line-height: 1.2;">
                        I agree to the <a href="#" onclick="showTerms()" style="color: var(--primary-cyan); text-decoration: underline;">Community Guidelines</a>.
                    </label>
                </div>
                <button type="submit" class="submit-btn">ACTIVATE MY NODE</button>
            </form>
        </div>

        <div id="item-container" class="form-container" style="border-color: var(--success-green); display: none;">
            <form id="itemForm">
                <h2 style="color: var(--success-green); margin-top: 0;">2. List Your Item</h2>
                <input type="hidden" id="hiddenEmail" name="UserEmail">
                
                <label>Item Name</label>
                <input type="text" name="ItemName" placeholder="Ex: Trimmer" required>
                
                <label>Price per Day (₹) <a href="#" onclick="showPriceGuide()" style="font-size: 0.65rem; color: var(--primary-cyan); float: right;">PRICE TIPS?</a></label>
                <input type="number" name="Price" placeholder="Ex: 150" required>
                
                <label>Your Phone/WhatsApp</label>
                <input type="tel" name="Contact" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                
                <button type="submit" class="submit-btn" style="background: var(--success-green);">SUBMIT ITEM FOR REVIEW</button>
            </form>
        </div>
    </header>

    <div class="search-container">
        <label>Search Community Gear</label>
        <input type="text" id="searchInput" placeholder="Try searching 'Trimmer' or 'Drill'..." onkeyup="filterItems()">
    </div>

    <section id="inventory" style="padding: 0 20px 40px 20px; max-width: 1100px; width: 100%;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="color: var(--primary-cyan); letter-spacing: 2px;">COMMUNITY LISTINGS</h2>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px; flex-wrap: wrap;">
                <div style="font-size: 0.7rem; color: var(--success-green); border: 1px solid var(--success-green); padding: 5px 10px; border-radius: 20px;">✓ ID VERIFIED</div>
                <div style="font-size: 0.7rem; color: var(--success-green); border: 1px solid var(--success-green); padding: 5px 10px; border-radius: 20px;">✓ LIVE SYNC</div>
            </div>
        </div>

        <div id="dynamic-inventory" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;">
            <div class="loader"></div>
            <p style="text-align: center; width: 100%; color: var(--text-gray);">Fetching local nodes...</p>
        </div>
    </section>

    <div style="margin: 40px auto; text-align: center; max-width: 400px; padding: 20px;">
        <button onclick="shareNode()" class="cta-button" style="background: transparent; border: 2px solid var(--primary-cyan); color: var(--primary-cyan);">
            📢 INVITE NEIGHBORS
        </button>
    </div>

    <footer style="background: #0d1117; padding: 50px 20px; border-top: 1px solid #30363d; width: 100%; text-align: center;">
        <h2 style="color: var(--primary-cyan);">NeighborNode</h2>
        <p style="color: #484f58; font-size: 0.8rem;">&copy; 2026 NeighborNode. Support: neighbornode.help@gmail.com</p>
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyoFXZuQZE2l7Mxd65Iy8URFc3tALEKqJniASbiq4h206kRJhdxh7pRhL_N9lStAomE/exec';
        
        const activationContainer = document.getElementById('activation-container');
        const itemContainer = document.getElementById('item-container');
        const dynamicInventory = document.getElementById('dynamic-inventory');
        
        let isNodeActive = false; 
        let globalUserName = ""; 
        let allItems = []; 

        async function loadLiveInventory() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                allItems = data.items.slice(1); 
                renderItems(allItems);
            } catch (err) {
                dynamicInventory.innerHTML = `<p style="color: red;">Sync Error.</p>`;
            }
        }

        function renderItems(itemsToDisplay) {
            if (!itemsToDisplay || itemsToDisplay.length === 0) {
                dynamicInventory.innerHTML = `<p style="text-align: center; width:100%; color: var(--text-gray);">No items found.</p>`;
                return;
            }
            dynamicInventory.innerHTML = ""; 
            itemsToDisplay.forEach(row => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div style="position: absolute; top: 10px; right: 10px; background: var(--primary-cyan); color: black; padding: 4px 10px; border-radius: 10px; font-weight: 900; font-size: 0.8rem;">₹${row[2]}/DAY</div>
                    <img src="https://via.placeholder.com/300x200?text=${encodeURIComponent(row[1])}" class="item-img">
                    <h3>${row[1]}</h3>
                    <p style="color: var(--text-gray); font-size: 0.85rem; margin-bottom: 15px;">Available in your area.</p>
                    <button onclick="checkActivation('${row[1]}', ${row[2]})" class="cta-button">REQUEST RENTAL</button>
                `;
                dynamicInventory.appendChild(card);
            });
        }

        function filterItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(i => i[1].toString().toLowerCase().includes(term));
            renderItems(filtered);
        }

        document.getElementById('neighborForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const email = e.target.querySelector('[name="Email"]').value;
            globalUserName = e.target.querySelector('[name="Full Name"]').value;
            btn.innerText = "SYNCING NODE...";
            btn.disabled = true;
            setTimeout(() => showSuccessState(email), 4000);
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
        });

        function showSuccessState(email) {
            isNodeActive = true; 
            itemContainer.style.display = 'block'; 
            document.getElementById('hiddenEmail').value = email; 
            activationContainer.innerHTML = `<div style="text-align: center; padding: 20px; border: 2px solid var(--primary-cyan); border-radius: 20px;"><h2 style="color: var(--primary-cyan); margin:0;">WELCOME, ${globalUserName.toUpperCase()}!</h2><p>Node Active.</p></div>`;
        }

        document.getElementById('itemForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "UPLOADING...";
            btn.disabled = true;
            setTimeout(() => { resetListingForm(btn); loadLiveInventory(); }, 4000);
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
        });

        function resetListingForm(button) {
            alert("Success! Your item is now live.");
            document.getElementById('itemForm').reset();
            button.innerText = "SUBMIT ANOTHER ITEM";
            button.disabled = false;
        }

        function checkActivation(item, price) {
            if (!isNodeActive) { alert("Activate Node first!"); window.scrollTo(0, 0); }
            else { window.open(`https://wa.me/918497956893?text=${encodeURIComponent("Hi! I want to rent " + item + " for ₹" + price)}`, '_blank'); }
        }

        function showTerms() { alert("Rules: Respect assets, pay for damage, and meet in public."); }
        function showPriceGuide() { alert("Pricing: Tools ₹50-150, Travel ₹100-250, Gear ₹200+"); }
        function shareNode() { window.open(`https://wa.me/?text=${encodeURIComponent("Join NeighborNode: " + window.location.href)}`, '_blank'); }

        // COMPLETE INDIA STATES DATA
        const stateData = {
            "Andhra Pradesh": "Amaravati", "Arunachal Pradesh": "Itanagar", "Assam": "Dispur", "Bihar": "Patna", "Chhattisgarh": "Raipur", "Goa": "Panaji", "Gujarat": "Gandhinagar", "Haryana": "Chandigarh", "Himachal Pradesh": "Shimla", "Jharkhand": "Ranchi", "Karnataka": "Bengaluru", "Kerala": "Thiruvananthapuram", "Madhya Pradesh": "Bhopal", "Maharashtra": "Mumbai", "Manipur": "Imphal", "Meghalaya": "Shillong", "Mizoram": "Aizawl", "Nagaland": "Kohima", "Odisha": "Bhubaneswar", "Punjab": "Chandigarh", "Rajasthan": "Jaipur", "Sikkim": "Gangtok", "Tamil Nadu": "Chennai", "Telangana": "Hyderabad", "Tripura": "Agartala", "Uttar Pradesh": "Lucknow", "Uttarakhand": "Dehradun", "West Bengal": "Kolkata", "Delhi": "New Delhi"
        };

        const countrySelect = document.getElementById('country');
        const stateSelect = document.getElementById('state');
        const citySelect = document.getElementById('city');

        countrySelect.addEventListener('change', function() {
            if (this.value === "India") {
                stateSelect.disabled = false;
                // Sort states alphabetically for better experience
                const sortedStates = Object.keys(stateData).sort();
                stateSelect.innerHTML = '<option value="">Select State</option>' + sortedStates.map(s => `<option value="${s}">${s}</option>`).join('');
            }
        });

        stateSelect.addEventListener('change', function() {
            if (this.value !== "") {
                citySelect.disabled = false;
                citySelect.innerHTML = `<option value="${stateData[this.value]}">${stateData[this.value]}</option>`;
            }
        });

        const nodeText = document.getElementById('nodeCounter');
        const statuses = ["📡 SCANNING LOCAL NODES...", "✅ LIVE INVENTORY SYNCED", "📍 HUB ACTIVE"];
        let statusIdx = 0;
        setInterval(() => { nodeText.innerText = statuses[statusIdx % statuses.length]; statusIdx++; }, 3000);

        window.onload = loadLiveInventory;
    </script>
</body>
</html>
