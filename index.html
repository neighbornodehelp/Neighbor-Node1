<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeighborNode | Secure Neighborhood Rental Network</title>
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
            --text-gray: #8b949e;
            --success-green: #2ea043;
            --error-red: #f85149;
            --verify-blue: #1d9bf0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* HEADER STYLING */
        header { padding: 60px 20px; text-align: center; max-width: 800px; width: 100%; }
        h1 { 
            font-size: 4rem; 
            margin: 0; 
            background: linear-gradient(90deg, #fff, var(--primary-cyan)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            font-weight: 800;
        }

        /* CONTAINER STYLING */
        .form-container {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            margin: 20px auto;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: 0.4s;
        }

        /* INPUT STYLING */
        label { 
            color: var(--primary-cyan); 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            font-weight: 800; 
            display: block; 
            text-align: left; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--primary-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        /* BUTTONS */
        .submit-btn, .cta-button {
            background: var(--primary-cyan);
            color: black;
            font-weight: 900;
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .submit-btn:hover, .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.4);
        }

        /* AUTH TABS */
        .auth-tabs { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        .tab-btn { 
            background: none; 
            border: 1px solid #30363d; 
            color: var(--text-gray); 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(0, 242, 255, 0.05); }

        /* ITEM CARDS */
        .item-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            position: relative;
            transition: 0.4s;
        }

        .item-card:hover {
            border-color: var(--primary-cyan);
            background: rgba(0, 242, 255, 0.05);
            transform: translateY(-10px);
        }

        .price-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary-cyan);
            color: black;
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.9rem;
        }

        .location-tag {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin: 10px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* GATED CONTENT */
        #main-app { display: none; width: 100%; max-width: 1200px; flex-direction: column; align-items: center; padding-bottom: 100px; }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* VERIFICATION CARD */
        #verify-card {
            border: 2px solid var(--verify-blue);
            background: rgba(29, 155, 240, 0.05);
            max-width: 600px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div id="nodeStatus" style="color: var(--primary-cyan); font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 3px;">📡 NODE STATUS: LOCKED</div>
        <h1>NeighborNode</h1>
        <p style="color: var(--text-gray); font-size: 1.1rem;">Secure Peer-to-Peer Neighborhood Network.</p>

        <div id="auth-box" class="form-container">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="toggleAuth('login')">LOGIN</button>
                <button id="tab-signup" class="tab-btn" onclick="toggleAuth('signup')">ACTIVATE NODE</button>
            </div>

            <form id="loginForm">
                <label>Registered Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email address" required>
                <button type="submit" class="submit-btn">ACCESS NETWORK</button>
            </form>

            <form id="neighborForm" style="display: none;">
                <label>Full Name</label>
                <input type="text" name="Full Name" placeholder="Ex: Rahul Sharma" required>
                <label>Country</label>
                <select id="country" name="Country" required><option value="India">India</option></select>
                <label>State</label>
                <select id="state" name="State" required><option value="">Select State</option></select>
                <label>District/City (Capital)</label>
                <select id="city" name="City" required><option value="">Select Capital</option></select>
                <label>Email Address</label>
                <input type="email" name="Email" placeholder="rahul@example.com" required>
                <button type="submit" class="submit-btn">ACTIVATE NODE</button>
            </form>
        </div>
    </header>

    <div id="main-app">
        <div id="verify-card" class="form-container">
            <h3 style="color: var(--verify-blue); margin-top: 0;">🛡️ Get Trusted Badge</h3>
            <p style="color: var(--text-gray); font-size: 0.9rem;">Verify your Aadhaar to get the blue checkmark ✅ and rent items faster.</p>
            <button onclick="requestVerification()" class="cta-button" style="background: var(--verify-blue); color: white;">VERIFY MY IDENTITY</button>
        </div>

        <div class="form-container" style="border-color: var(--success-green); max-width: 600px;">
            <form id="itemForm">
                <h2 style="color: var(--success-green); margin-top: 0; text-align: center;">List Community Gear</h2>
                <input type="hidden" id="hiddenEmail" name="UserEmail">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>Item Name</label>
                        <input type="text" name="ItemName" placeholder="Ex: Power Drill" required>
                    </div>
                    <div>
                        <label>Price/Day (₹)</label>
                        <input type="number" name="Price" placeholder="Ex: 150" required>
                    </div>
                </div>
                <label>WhatsApp Number</label>
                <input type="tel" name="Contact" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                <label>Specific Place / Landmark</label>
                <input type="text" name="Place" placeholder="Ex: Kukatpally, Phase 1" required>
                <button type="submit" class="submit-btn" style="background: var(--success-green);">POST LISTING</button>
            </form>
        </div>

        <div style="width: 100%; max-width: 700px; margin: 50px auto; padding: 0 20px; box-sizing: border-box;">
            <label style="text-align: center; font-size: 1rem; margin-bottom: 15px;">Search Local Inventory</label>
            <input type="text" id="searchInput" placeholder="Try 'Trimmer', 'Drill'..." onkeyup="filterItems()" style="text-align: center; font-size: 1.2rem; padding: 20px; border-radius: 20px;">
        </div>

        <section id="inventory-section" style="width: 100%; padding: 0 20px;">
            <div id="dynamic-inventory" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                <div class="loader"></div>
            </div>
        </section>

        <div style="margin-top: 80px; text-align: center;">
            <button onclick="shareNode()" class="cta-button" style="background: transparent; border: 2px solid var(--primary-cyan); color: var(--primary-cyan); width: auto; padding: 15px 40px;">📢 INVITE NEIGHBORS</button>
            <p onclick="logout()" style="color: var(--error-red); cursor: pointer; margin-top: 30px; text-decoration: underline; font-weight: bold;">Logout Account</p>
        </div>
    </div>

    <footer style="margin-top: 100px; padding: 40px; border-top: 1px solid #30363d; width: 100%; text-align: center; color: var(--text-gray); font-size: 0.8rem;">
        &copy; 2026 NeighborNode Network. All Rights Reserved.
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbznZiKTkVndDru2r8M-3KgQrkAjT7WOpZRzWmzAIdmjblpxEoi2M3GGKKyCJktM1a64/exec';
        const ADMIN_EMAIL = 'neighbornode.help@gmail.com'; 
        
        let allItems = [];
        let globalUserName = "";
        let isAdmin = false;

        window.onload = () => {
            const savedEmail = localStorage.getItem('neighborEmail');
            const savedName = localStorage.getItem('neighborName');
            if (savedEmail && savedName) {
                globalUserName = savedName;
                isAdmin = (savedEmail.toLowerCase() === ADMIN_EMAIL.toLowerCase());
                unlockApp(savedEmail);
            }
            setupDropdowns();
        };

        function toggleAuth(type) {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('neighborForm').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-signup').classList.toggle('active', type === 'signup');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.toLowerCase();
            const btn = e.target.querySelector('button');
            btn.innerText = "AUTHENTICATING...";
            try {
                const resp = await fetch(`${scriptURL}?checkEmail=${encodeURIComponent(email)}`);
                const res = await resp.json();
                if (res.exists) {
                    localStorage.setItem('neighborEmail', email);
                    localStorage.setItem('neighborName', res.name);
                    globalUserName = res.name;
                    isAdmin = (email === ADMIN_EMAIL.toLowerCase());
                    unlockApp(email);
                } else { alert("Account not found!"); btn.innerText = "ACCESS NETWORK"; }
            } catch (err) { alert("Error connecting to server."); }
        });

        function unlockApp(email) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('hiddenEmail').value = email;
            document.getElementById('nodeStatus').innerText = isAdmin ? "📡 ADMIN NODE ONLINE" : `📡 NODE ONLINE: ${globalUserName.toUpperCase()}`;
            loadInventory();
        }

        async function loadInventory() {
            try {
                const resp = await fetch(scriptURL);
                const data = await resp.json();
                allItems = data.items.slice(1);
                
                // Check if the current user is verified to hide/show the card
                const currentUserEmail = localStorage.getItem('neighborEmail');
                const userRow = allItems.find(row => row[4] && row[4].toString().toLowerCase() === currentUserEmail.toLowerCase());
                const isVerified = (userRow && userRow[6] === "YES");
                
                if (!isVerified && !isAdmin) {
                    document.getElementById('verify-card').style.display = 'block';
                }

                renderItems(allItems);
            } catch (err) { console.error(err); }
        }

        function renderItems(list) {
            const div = document.getElementById('dynamic-inventory');
            div.innerHTML = list.length ? "" : "<p>No items found.</p>";
            list.forEach(row => {
                const isVerified = (row[6] === "YES");
                div.innerHTML += `
                    <div class="item-card">
                        <div class="price-badge">₹${row[2]}/DAY</div>
                        <h3 style="margin-top:20px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                            ${row[1]} ${isVerified ? '<span style="color: #1d9bf0;">✅</span>' : ''}
                        </h3>
                        <div class="location-tag">
                            📍 ${row[5] || 'Area Not Specified'}
                            ${isVerified ? '<span style="color: #1d9bf0; font-size: 0.7rem; font-weight:bold;">TRUSTED NEIGHBOR</span>' : ''}
                        </div>
                        <button onclick="window.open('https://wa.me/91${row[3]}')" class="cta-button">RENT NOW</button>
                        ${isAdmin ? `<button onclick="deleteItem('${row[1]}', '${row[4]}')" style="background:red; color:white; margin-top:15px; border:none; padding:10px; border-radius:10px; width:100%; cursor:pointer; font-weight:bold;">DELETE AS ADMIN</button>` : ''}
                    </div>`;
            });
        }

        async function deleteItem(name, owner) {
            if(!confirm(`Delete "${name}"?`)) return;
            const response = await fetch(`${scriptURL}?action=delete&itemName=${encodeURIComponent(name)}&ownerEmail=${encodeURIComponent(owner)}`);
            alert("Deleted!"); loadInventory();
        }

        function requestVerification() {
            const name = localStorage.getItem('neighborName');
            const email = localStorage.getItem('neighborEmail');
            const adminPhone = "917416558510"; 
            const msg = `Hi Admin, I am ${name} (${email}). I want to verify my Aadhaar for NeighborNode.`;
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderItems(allItems.filter(i => i[1].toString().toLowerCase().includes(term) || i[5].toString().toLowerCase().includes(term)));
        }

        function setupDropdowns() {
            const stateData = { "Andhra Pradesh": "Amaravati", "Arunachal Pradesh": "Itanagar", "Assam": "Dispur", "Bihar": "Patna", "Chhattisgarh": "Raipur", "Goa": "Panaji", "Gujarat": "Gandhinagar", "Haryana": "Chandigarh", "Himachal Pradesh": "Shimla", "Jharkhand": "Ranchi", "Karnataka": "Bengaluru", "Kerala": "Thiruvananthapuram", "Madhya Pradesh": "Bhopal", "Maharashtra": "Mumbai", "Manipur": "Imphal", "Meghalaya": "Shillong", "Mizoram": "Aizawl", "Nagaland": "Kohima", "Odisha": "Bhubaneswar", "Punjab": "Chandigarh", "Rajasthan": "Jaipur", "Sikkim": "Gangtok", "Tamil Nadu": "Chennai", "Telangana": "Hyderabad", "Tripura": "Agartala", "Uttar Pradesh": "Lucknow", "Uttarakhand": "Dehradun", "West Bengal": "Kolkata", "Delhi": "New Delhi" };
            const sSelect = document.getElementById('state');
            const cSelect = document.getElementById('city');
            const sorted = Object.keys(stateData).sort();
            sSelect.innerHTML = '<option value="">Select State</option>' + sorted.map(s => `<option value="${s}">${s}</option>`).join('');
            sSelect.onchange = () => { cSelect.innerHTML = `<option value="${stateData[sSelect.value]}">${stateData[sSelect.value]}</option>`; };
        }

        document.getElementById('itemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(this), mode: 'no-cors' }).then(() => { alert("Listing Live!"); location.reload(); });
        });

        document.getElementById('neighborForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(scriptURL, { method: 'POST', body: new FormData(this), mode: 'no-cors' }).then(() => { alert("Signup Success! Login now."); location.reload(); });
        });

        function logout() { localStorage.clear(); location.reload(); }
        function shareNode() { window.open(`https://wa.me/?text=${encodeURIComponent("Join NeighborNode: " + window.location.href)}`, '_blank'); }
    </script>
</body>
</html>
